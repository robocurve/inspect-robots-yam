name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege: every job only reads the repo contents.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint + strict typing, once. mypy targets the 3.10 floor via pyproject; running
  # it on 3.11 avoids NumPy's 3.12-only stub syntax.
  quality:
    name: lint · type
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
      - name: Install from uv.lock (dev extras)
        run: uv sync --locked --python 3.11 --extra dev
      - name: Ruff (lint)
        run: uv run ruff check .
      - name: Ruff (format check)
        run: uv run ruff format --check .
      - name: Mypy (strict)
        run: uv run mypy

  # Blocking test gate across the supported OS x Python matrix (100% coverage).
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
      - name: Install from uv.lock (dev extras)
        run: uv sync --locked --python ${{ matrix.python-version }} --extra dev
      - name: Pytest (100% coverage)
        run: uv run pytest --cov --cov-report=term-missing

  # Dependency hygiene: the package must import with ONLY its runtime deps
  # (inspect_robots + numpy) — no requests, json_numpy, or i2rt (those are lazy extras).
  import-hygiene:
    name: import without client/hardware extras
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
      - name: Install runtime only from uv.lock (no extras)
        run: uv sync --locked --python 3.12
      - name: Assert optional deps absent, then import
        run: |
          uv run python - <<'PY'
          import importlib.util
          for mod in ("requests", "json_numpy", "i2rt"):
              assert importlib.util.find_spec(mod) is None, f"{mod} unexpectedly installed"
          import inspect_robots_yam
          print("inspect_robots_yam", inspect_robots_yam.__version__, "imported with runtime deps only")
          PY

  # Single required status check for branch protection: green iff every job
  # above is green. Add new jobs to 'needs' here or they won't gate merges.
  ci-ok:
    name: ci-ok
    if: ${{ always() }}
    needs: [quality, test, import-hygiene]
    runs-on: ubuntu-latest
    steps:
      - name: Fail unless every needed job succeeded
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: echo "$RESULTS" | jq -e 'all(.[]; .result == "success")'

  # Red main is a stop-the-line event: open an issue so it can't go unnoticed.
  # Only fires on pushes (i.e. merges to main), never on PR runs.
  alert-red-main:
    name: alert on red main
    if: ${{ failure() && github.event_name == 'push' }}
    needs: [quality, test, import-hygiene]
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open an issue unless one is already open
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          existing=$(gh issue list -R "$GITHUB_REPOSITORY" --state open --search "CI is red on main in:title" --json number --jq length)
          if [ "$existing" = "0" ]; then
            gh issue create -R "$GITHUB_REPOSITORY"               --title "CI is red on main (${GITHUB_SHA:0:8})"               --body "CI failed on a push to main: $RUN_URL — stop-the-line: fix forward or revert before merging anything else. If the failure is transient (network, external deps), re-run the failed jobs and close this."
          else
            echo "an open red-main issue already exists; not filing another"
          fi
